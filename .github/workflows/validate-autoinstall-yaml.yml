name: Validate Autoinstall YAML

on:
  push:
    paths:
      - "**/user-data.yml"
      - "**/user-data.yaml"
      - "**/autoinstall*.yml"
      - "**/autoinstall*.yaml"
      - ".github/workflows/validate-autoinstall-yaml.yml"
  pull_request:
    paths:
      - "**/user-data.yml"
      - "**/user-data.yaml"
      - "**/autoinstall*.yml"
      - "**/autoinstall*.yaml"
      - ".github/workflows/validate-autoinstall-yaml.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-yaml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install YAML parser
        run: python3 -m pip install --upgrade pip pyyaml

      - name: Validate YAML syntax for autoinstall templates
        run: python3 scripts/validate_autoinstall_yaml.py

