#cloud-config

# Target: Ubuntu Desktop 24.04 on MacBookPro7,1 (MacBook Pro 13-inch Mid 2010)
# Context: dual-boot alongside macOS (storage is auto-configured to preserve macOS partitions)

# Autoinstall configuration reference: https://canonical-subiquity.readthedocs-hosted.com/en/latest/reference/autoinstall-reference.html
autoinstall:
  version: 1

  # # Set the sections that should be user-interactive during the installation process
  # interactive-sections:
  #   - identity

  # Refresh the installer to ensure it has the latest updates and bug fixes
  # Uses "stable/ubuntu-$REL" stable release channel by default
  refresh-installer:
    update: true

  source:
    # Search for available third-party drivers
    search_drivers: true
    # Install minimal desktop environment
    id: ubuntu-desktop-minimal

  # Storage configuration with recovery partition
  storage:
    layout:
      name: direct

  # Automatically configure the initial user for the system
  # NOTE: To manually setup the user using the installation GUI instead, comment out this section and add 'identity' to the `interactive-sections` above
  # Alternatively, you can use the `user-data` section instead of this `identity` section to prompt for the initial user on first boot (see https://github.com/canonical/autoinstall-desktop?tab=readme-ov-file#installation-without-a-default-user)
  # The 'password' field requires a hashed password generated by `mkpasswd` or `openssl passwd`
  # For example, `openssl passwd -6 "SecurePassword123!"` will generate a SHA-512 password hash that can be provided below
  # TODO: Add post-installation script that will warn the user to change the default password on login for better security
  identity:
    username: ubuntu
    password: '$6$EIJ9ST2Y.7C/ZIDi$gXpzldB/ME.BudSWrOBhWAUhfAiyuj8Wjw7mnp.q5IHIB0OuMQjkE0OMZMy/NAP6OZ94ED05KZLYCSkJVL5E51' # Initial password of 'changeme'. Make sure to update this after installation!
    hostname: mbp-2010-ubuntu

  # ssh:
  #   # Install OpenSSH server to allow remote access
  #   # NOTE: Ubuntu Desktop installation ISO does not include openssh-server, so internet access is required during installation
  #   install-server: true
  #   # Provide public keys as generated by ssh-keygen if desired
  #   authorized-keys:
  #     - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDjyJDTxdjoONg0U7zeYjJGDMTJ8jc26VLkXcA5Wbjit tylermilner@gmail.com"
  #   # Disallow password login
  #   allow-pw: false

  codecs:
    # No need to install additional codecs for media playback
    install: false

  # drivers:
  #   # Install available third-party drivers as suggested by `ubuntu-drivers` for better hardware compatibility
  #   install: true

  # Install snaps for additional applications and utilities if desired
  snaps:
    # Install Visual Studio Code
    - name: code
      classic: true

  # Install additional packages using apt
  # packages:
  #   - git
  #   - curl
  #   - vim
    # - python3

  # Set timezone
  timezone: "America/Chicago"

  # # Auto-download all updates after installation
  # updates: all

  # Reboot automatically after installation is complete
  shutdown: reboot

  # Run additional commands after installation and all updates are installed, but before the system reboots
  # Use `curtin in-target -- <command>` to run commands in the installed system's environment (mounted at `/target`)
  late-commands:
    # Disable the boot splash so that we more easily diagnose potential boot errors during startup
    - >-
      curtin in-target --
      sed -i /etc/default/grub -e
      's/GRUB_CMDLINE_LINUX_DEFAULT=".*/GRUB_CMDLINE_LINUX_DEFAULT=""/'
    - curtin in-target -- update-grub

  # user-data:
  #   write_files:
  #    - path: /opt/payload_script.sh
  #      permissions: '0755'
  #      content: |
  #         #!/bin/bash         
  #         echo "user-data script is running"
  #         echo "user-data script complete"
  #   runcmd:
  #     - cd /opt
  #     - ./payload_script.sh >> /var/log/payload.log