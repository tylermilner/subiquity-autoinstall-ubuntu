#cloud-config

# Target: Ubuntu Desktop 24.04 on MacBookPro7,1 (MacBook Pro 13-inch Mid 2010)
# Context: dual-boot alongside macOS (storage is auto-configured to preserve macOS partitions)

# Autoinstall configuration reference: https://canonical-subiquity.readthedocs-hosted.com/en/latest/reference/autoinstall-reference.html
autoinstall:
  version: 1

  # Set the sections that should be user-interactive during the installation process
  interactive-sections:
    - identity

  # Refresh the installer to ensure it has the latest updates and bug fixes
  # Uses "stable/ubuntu-$REL" stable release channel by default
  refresh-installer:
    update: true

  source:
    # Search for available third-party drivers
    search_drivers: true
    # Install minimal desktop environment
    id: ubuntu-desktop-minimal

  # Storage configuration for dual-boot with macOS
  # Uses action-based (curtin) syntax to preserve existing macOS partitions while
  # reformatting the Ubuntu partition.
  #
  # Expected disk layout (verify with `lsblk` or `sudo fdisk -l /dev/vda` from the live installer):
  #   /dev/vda1 = ~200 MB  = EFI System Partition (VFAT) - shared with macOS
  #   /dev/vda2 = ~250 GB  = macOS partition (APFS) - DO NOT TOUCH
  #   /dev/vda3 = ~250 GB  = Ubuntu partition (will be reformatted as ext4)
  #
  # IMPORTANT: The partition sizes below MUST match your actual disk layout.
  #   Run `sudo fdisk -l /dev/vda` from the live installer environment to get exact
  #   sizes and update the values below accordingly before running the install.
  #
  # NOTE: `reset-partition` is only supported with layout-based storage config
  #   (which wipes the entire disk) and is therefore not compatible with this
  #   dual-boot setup. To recover/reinstall Ubuntu, boot from USB installation
  #   media instead.
  storage:
    swap:
      size: 0
    config:
      # Disk: preserve the existing GPT partition table
      - type: disk
        id: disk-vda
        ptable: gpt
        path: /dev/vda
        preserve: true
        grub_device: true

      # /dev/vda1: EFI System Partition (~200 MB) - shared between macOS and Ubuntu
      # GRUB is installed here alongside the macOS bootloader
      - type: partition
        id: partition-efi
        device: disk-vda
        number: 1
        flag: boot
        preserve: true
        grub_device: true

      # /dev/vda2: macOS partition (~250 GB) - preserved, untouched
      - type: partition
        id: partition-macos
        device: disk-vda
        number: 2
        preserve: true

      # /dev/vda3: Ubuntu partition (~250 GB) - existing partition is reformatted
      - type: partition
        id: partition-ubuntu
        device: disk-vda
        number: 3
        wipe: superblock
        preserve: true

      # Keep the existing EFI filesystem intact (macOS bootloader lives here)
      - type: format
        id: format-efi
        fstype: fat32
        volume: partition-efi
        preserve: true

      # Format the Ubuntu partition as ext4
      - type: format
        id: format-ubuntu
        fstype: ext4
        volume: partition-ubuntu
        preserve: false

      # Mount the EFI partition
      - type: mount
        id: mount-efi
        device: format-efi
        path: /boot/efi

      # Mount the Ubuntu root filesystem
      - type: mount
        id: mount-ubuntu
        device: format-ubuntu
        path: /

  # Automatically configure the initial user for the system
  # NOTE: To use this, make sure to remove 'identity' from the `interactive-sections` above
  # Alternatively, you can use the `user-data` section instead of the `identity` section to prompt for the initial user on first boot (see https://github.com/canonical/autoinstall-desktop?tab=readme-ov-file#installation-without-a-default-user)
  # identity:
  #   username: ubuntu
  #   password: 'hashed_password_here' # Replace with the actual hashed password generated by `mkpasswd` or `openssl passwd`
  #   hostname: mbp-2010-ubuntu

  ssh:
    # Install OpenSSH server to allow remote access
    # NOTE: Ubuntu Desktop installation ISO does not include openssh-server, so internet access is required during installation
    install-server: true
    # Provide public keys as generated by ssh-keygen if desired
    authorized-keys:
      - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDjyJDTxdjoONg0U7zeYjJGDMTJ8jc26VLkXcA5Wbjit tylermilner@gmail.com"
    # Disallow password login
    allow-pw: false

  codecs:
    # No need to install additional codecs for media playback
    install: false

  drivers:
    # Install available third-party drivers as suggested by `ubuntu-drivers` for better hardware compatibility
    install: true

  # Install snaps for additional applications and utilities if desired
  snaps:
    # Install Visual Studio Code
    - name: code
      classic: true

  # Install additional packages using apt
  packages:
    - git
    - curl
    - vim
    # - python3

  # Set timezone
  timezone: "America/Chicago"

  # Auto-download all updates after installation
  updates: all

  # Reboot automatically after installation is complete
  shutdown: reboot

  # Run additional commands after installation and all updates are installed, but before the system reboots
  # Use `curtin in-target -- <command>` to run commands in the installed system's environment (mounted at `/target`)
  late-commands:
    # Disable the boot splash so that we more easily diagnose potential boot errors during startup
    - >-
      curtin in-target --
      sed -i /etc/default/grub -e
      's/GRUB_CMDLINE_LINUX_DEFAULT=".*/GRUB_CMDLINE_LINUX_DEFAULT=""/'
    - curtin in-target -- update-grub
